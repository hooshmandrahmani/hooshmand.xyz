<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 115" fill="none">
  <style>@media (prefers-color-scheme:dark){:root{filter:invert(100%)}}</style>

  <!-- ── Lion head outline (right-facing profile, stroke only) ── -->
  <path
    stroke="#1B2B5E" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"
    d="
      M 52 22
      C 54 14, 64 9, 74 7
      L 82 3
      L 85 15
      C 92 16, 100 24, 103 35
      C 107 50, 101 68, 90 76
      C 82 82, 70 83, 60 78
      C 49 72, 43 59, 45 47
      C 47 36, 48 28, 52 22 Z
    "
  />

  <!-- ── Brow / inner face contour ── -->
  <path
    stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"
    d="M 66 31 C 72 28, 80 30, 85 35"
  />

  <!-- ── Eye ── -->
  <circle cx="78" cy="42" r="4" stroke="#1B2B5E" stroke-width="3.5"/>

  <!-- ── Nose ── -->
  <path
    stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
    d="M 98 54 C 101 52, 104 54, 102 57 C 100 60, 97 58, 98 54 Z"
  />

  <!-- ── Mouth ── -->
  <path
    stroke="#1B2B5E" stroke-width="3" stroke-linecap="round"
    d="M 96 62 Q 100 67 96 72"
  />

  <!-- ── Chin detail line ── -->
  <path
    stroke="#1B2B5E" stroke-width="3" stroke-linecap="round"
    d="M 73 77 C 64 83, 55 82, 50 76"
  />

  <!-- ══ Circuit mane — 4 strands ══ -->

  <!-- Strand 1 · top -->
  <line x1="50" y1="24" x2="22" y2="14" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="22" y1="14" x2="9"  y2="21" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="22" y1="14" x2="16" y2="3"  stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="22" cy="14" r="5"  stroke="#1B2B5E" stroke-width="3.5" fill="none"/>
  <circle cx="9"  cy="21" r="3.5" fill="#1B2B5E"/>
  <circle cx="16" cy="3"  r="3.5" fill="#1B2B5E"/>

  <!-- Strand 2 · upper-mid -->
  <line x1="45" y1="38" x2="16" y2="32" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="16" y1="32" x2="4"  y2="40" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="16" y1="32" x2="9"  y2="21" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="16" cy="32" r="5"  stroke="#1B2B5E" stroke-width="3.5" fill="none"/>
  <circle cx="4"  cy="40" r="3.5" fill="#1B2B5E"/>

  <!-- Strand 3 · mid -->
  <line x1="43" y1="52" x2="13" y2="52" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="13" y1="52" x2="3"  y2="61" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="13" y1="52" x2="6"  y2="42" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="13" cy="52" r="5"  stroke="#1B2B5E" stroke-width="3.5" fill="none"/>
  <circle cx="3"  cy="61" r="3.5" fill="#1B2B5E"/>
  <circle cx="6"  cy="42" r="3.5" fill="#1B2B5E"/>

  <!-- Strand 4 · lower -->
  <line x1="46" y1="67" x2="19" y2="73" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="19" y1="73" x2="8"  y2="82" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="19" y1="73" x2="11" y2="63" stroke="#1B2B5E" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="19" cy="73" r="5"  stroke="#1B2B5E" stroke-width="3.5" fill="none"/>
  <circle cx="8"  cy="82" r="3.5" fill="#1B2B5E"/>
  <circle cx="11" cy="63" r="3.5" fill="#1B2B5E"/>
</svg>

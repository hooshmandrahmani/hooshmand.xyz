<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>@media (prefers-color-scheme:dark){:root{filter:invert(100%)}}</style>

  <!-- Lion head — right-facing profile, solid fill -->
  <path fill="#1a2744" d="
    M 56 14
    C 68 10, 88 20, 90 38
    C 93 54, 84 70, 71 75
    C 63 79, 53 77, 47 70
    C 40 63, 39 52, 43 42
    C 47 31, 48 17, 56 14 Z
  "/>

  <!-- Ear — solid triangle -->
  <polygon fill="#1a2744" points="69,11 82,3 85,18"/>

  <!-- Eye — bold dot -->
  <circle fill="#ffffff" cx="73" cy="43" r="4"/>
  <circle fill="#1a2744" cx="73" cy="43" r="2.2"/>

  <!-- Nostril -->
  <ellipse fill="#ffffff" cx="87" cy="55" rx="2.5" ry="2"/>

  <!-- Circuit mane — bold strokes + large nodes -->
  <!-- Top strand -->
  <line x1="49" y1="26" x2="24" y2="15" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="15" x2="11" y2="21" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <line x1="24" y1="15" x2="18" y2="4"  stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <circle cx="24" cy="15" r="3.5" fill="#1a2744"/>
  <circle cx="11" cy="21" r="2.5" fill="#1a2744"/>
  <circle cx="18" cy="4"  r="2.5" fill="#1a2744"/>

  <!-- Upper-mid strand -->
  <line x1="44" y1="40" x2="17" y2="34" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <line x1="17" y1="34" x2="5"  y2="40" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <line x1="17" y1="34" x2="9"  y2="23" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <circle cx="17" cy="34" r="3.5" fill="#1a2744"/>
  <circle cx="5"  cy="40" r="2.5" fill="#1a2744"/>
  <circle cx="9"  cy="23" r="2.5" fill="#1a2744"/>

  <!-- Mid strand -->
  <line x1="42" y1="54" x2="14" y2="54" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="54" x2="4"  y2="62" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="54" x2="6"  y2="44" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <circle cx="14" cy="54" r="3.5" fill="#1a2744"/>
  <circle cx="4"  cy="62" r="2.5" fill="#1a2744"/>
  <circle cx="6"  cy="44" r="2.5" fill="#1a2744"/>

  <!-- Lower strand -->
  <line x1="45" y1="66" x2="21" y2="71" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <line x1="21" y1="71" x2="10" y2="79" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <line x1="21" y1="71" x2="12" y2="62" stroke="#1a2744" stroke-width="3" stroke-linecap="round"/>
  <circle cx="21" cy="71" r="3.5" fill="#1a2744"/>
  <circle cx="10" cy="79" r="2.5" fill="#1a2744"/>
  <circle cx="12" cy="62" r="2.5" fill="#1a2744"/>
</svg>

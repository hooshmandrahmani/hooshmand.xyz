<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>@media (prefers-color-scheme:dark){:root{filter:invert(100%)}}</style>

  <!-- Lion head shape — right-facing profile -->
  <path fill="#1a2744" d="
    M 58 17
    C 70 13, 87 21, 89 37
    C 92 51, 85 67, 74 73
    C 66 78, 56 77, 49 71
    C 42 65, 40 55, 43 44
    C 46 33, 50 20, 58 17 Z
  "/>

  <!-- Ear -->
  <path fill="#1a2744" d="M 71 13 L 82 5 L 84 19 Z"/>

  <!-- Eye -->
  <circle fill="#1a2744" cx="74" cy="43" r="3"/>

  <!-- Nostril -->
  <ellipse fill="#1a2744" cx="87" cy="54" rx="2.2" ry="1.6"/>

  <!-- Circuit mane — strokes + nodes radiating leftward from the head -->
  <!-- Strand 1: upper -->
  <line x1="50" y1="27" x2="26" y2="17" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="17" x2="14" y2="22" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="17" x2="20" y2="7"  stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="26" cy="17" r="2.5" fill="#1a2744"/>
  <circle cx="14" cy="22" r="2"   fill="#1a2744"/>
  <circle cx="20" cy="7"  r="2"   fill="#1a2744"/>

  <!-- Strand 2: mid-upper -->
  <line x1="44" y1="40" x2="18" y2="35" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="18" y1="35" x2="6"  y2="40" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="18" y1="35" x2="10" y2="25" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="18" cy="35" r="2.5" fill="#1a2744"/>
  <circle cx="6"  cy="40" r="2"   fill="#1a2744"/>
  <circle cx="10" cy="25" r="2"   fill="#1a2744"/>

  <!-- Strand 3: mid -->
  <line x1="43" y1="53" x2="15" y2="53" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="15" y1="53" x2="5"  y2="60" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="15" y1="53" x2="7"  y2="44" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="15" cy="53" r="2.5" fill="#1a2744"/>
  <circle cx="5"  cy="60" r="2"   fill="#1a2744"/>
  <circle cx="7"  cy="44" r="2"   fill="#1a2744"/>

  <!-- Strand 4: lower -->
  <line x1="46" y1="65" x2="22" y2="69" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="22" y1="69" x2="11" y2="76" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="22" y1="69" x2="13" y2="61" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="22" cy="69" r="2.5" fill="#1a2744"/>
  <circle cx="11" cy="76" r="2"   fill="#1a2744"/>
  <circle cx="13" cy="61" r="2"   fill="#1a2744"/>
</svg>
